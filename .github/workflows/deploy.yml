name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into HTML
        run: |
          sed -i \
            -e 's/{{AMY_FULL_NAME}}/${{ secrets.AMY_FULL_NAME }}/g' \
            -e 's/{{AMY_EMAIL}}/${{ secrets.AMY_EMAIL }}/g' \
            -e 's/{{AMY_PHONE}}/${{ secrets.AMY_PHONE }}/g' \
            index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
